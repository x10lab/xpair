# cargo-deny configuration — dependency license firewall for `pake`.
#
# `pake` is pure first-party code, licensed AGPL-3.0-or-later
# (dual-licensable — we own the copyright). To keep that dual-licensing option,
# every DEPENDENCY must stay permissive (MIT/Apache/etc.): we cannot sell a
# commercial license for copyleft code we don't own. So — permissive-only
# allow-list for deps; AGPL is allowed ONLY for our own crate (exception below).
#
# This mirrors host/rd/screen/deny.toml exactly (same firewall, same policy).
# This file IS the LICENSE GATE for Component P / ADR Fork #1: the SPAKE2
# dependency tree (`spake2` + RustCrypto) must pass `cargo-deny check licenses`
# with this permissive-only allow-list, or the crate is unusable.
#
# Run:  cargo-deny check licenses
#       cargo-deny check bans
#       cargo-deny check            # all checks

[graph]
# Evaluate the dependency graph for the host target we actually ship.
targets = [
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
]
all-features = false

[licenses]
# Permissive allow-list only. Anything not on this list is rejected.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",          # weak-copyleft, file-level; permitted (not viral like GPL)
    "CC0-1.0",          # public-domain dedication, common for small crates
    "0BSD",             # public-domain-equivalent
    "Unlicense",        # public-domain-equivalent
]
# Copyleft licenses are NOT in `allow`, so they are denied by default.
confidence-threshold = 0.93
exceptions = [
    # Our own crate is AGPL-3.0; allow it here so cargo-deny passes while the
    # permissive-only policy still applies to every dependency.
    { name = "pake", allow = ["AGPL-3.0-or-later"] },
]

[bans]
# The permissive-only license allow-list above already rejects any copyleft
# (GPL/AGPL/…) dependency, so no per-crate name bans are needed.
multiple-versions = "warn"
wildcards = "allow"

[advisories]
yanked = "warn"

[sources]
# Only crates.io is trusted as a source for this crate.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
