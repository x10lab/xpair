name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v5

      - name: Shell syntax (bash -n)
        run: |
          set -e
          fail=0
          for f in shared/bootstrap.sh \
                   shared/install.sh shared/uninstall.sh shared/config.sh shared/lib.sh shared/sync-setup.sh \
                   client/cli/xpair client/cli/xpair-launch client/cli/xpair-askpass \
                   client/cli/xpair-desktop client/cli/xpair-mount client/cli/xpair-editor \
                   host/build-host.sh host/build-tmux-aqua.sh host/make-signing-cert.sh \
                   host/xpair-approve-router.sh; do
            [ -f "$f" ] || continue
            if bash -n "$f"; then echo "ok  $f"; else echo "FAIL $f"; fail=1; fi
          done
          exit $fail

      - name: Test suite (mock harness, 0 real ssh/tmux)
        run: cd tests && bash run.sh

      - name: Swift compile-check (RemotePairHost, no signing)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          # Compile via SwiftPM (mirrors build-host.sh: `swift build --package-path host -c release`)
          swift build --package-path host -c release
          echo "RemotePairHost compiles ✓"
