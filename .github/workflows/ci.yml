name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Shell syntax (bash -n)
        run: |
          set -e
          fail=0
          for f in shared/bootstrap.sh \
                   shared/install.sh shared/uninstall.sh shared/config.sh shared/lib.sh shared/sync-setup.sh \
                   client/remote-pair client/remote-pair-launch \
                   host/build-host.sh host/build-tmux-aqua.sh host/make-signing-cert.sh \
                   host/remote-pair-approve-router.sh; do
            [ -f "$f" ] || continue
            if bash -n "$f"; then echo "ok  $f"; else echo "FAIL $f"; fail=1; fi
          done
          exit $fail

      - name: Test suite (mock harness, 0 real ssh/tmux)
        run: cd tests && bash run.sh

      - name: Swift compile-check (RemotePairHost, no signing)
        run: |
          xcrun swiftc -O host/RemotePairHost/*.swift -o "$RUNNER_TEMP/rphost-compilecheck" \
            || xcrun swiftc -O -sdk "$(xcrun --show-sdk-path)" -target arm64-apple-macos13.0 \
                 host/RemotePairHost/*.swift -o "$RUNNER_TEMP/rphost-compilecheck"
          echo "RemotePairHost compiles ✓"
