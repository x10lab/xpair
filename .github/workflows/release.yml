name: Release

# Build + sign RemotePairHost.app with the stable self-signed cert and publish a GitHub Release.
# Trigger: push a tag like `v0.4.0`  (or run manually with a version input).
#
# Requires two repo secrets (the stable signing identity — grant persistence depends on it):
#   SIGNING_P12_BASE64    base64 of ~/Library/Application Support/RemotePair/signing.p12
#   SIGNING_P12_PASSWORD  the p12 password (default "rp" per make-signing-cert.sh)
# Without them the signed app would use a different designated requirement and break AX/SR grants.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without leading v (e.g. 0.4.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Releasing v$v"

      - name: Install build deps (tmux-aqua + cliclick for bundle embed)
        run: brew install libevent ncurses utf8proc cliclick

      # The screen sidecar (Contents/Helpers/screen, --features webrtc) is built by
      # build-host.sh via cargo. macos-latest runners have no Rust toolchain, so install it.
      - name: Install Rust toolchain (for screen sidecar)
        uses: dtolnay/rust-toolchain@stable

      # Cache cargo registry + the screen crate's target dir (ephemeral runners have no
      # warm cache; the webrtc build is ~1min). Keyed on the crate's Cargo.lock.
      - name: Cache cargo (screen sidecar)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            host/rd/screen/target
          key: cargo-screen-${{ runner.os }}-${{ hashFiles('host/rd/screen/Cargo.lock') }}
          restore-keys: |
            cargo-screen-${{ runner.os }}-

      - name: Build patched tmux-aqua
        run: ./host/build-tmux-aqua.sh

      # One step: import cert → build+sign → verify cert → publish.
      # MUST be a single shell: `security list-keychains -s` and the unlock are session-scoped,
      # so the keychain has to be set up and consumed by build-host's codesign in the same process.
      - name: Build, sign, verify, and publish
        env:
          P12_B64: ${{ secrets.SIGNING_P12_BASE64 }}
          P12_PW: ${{ secrets.SIGNING_P12_PASSWORD }}
          RP_VERSION: ${{ steps.ver.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          if [ -z "$P12_B64" ]; then
            echo "::error::SIGNING_P12_BASE64 secret is missing — cannot sign with the stable cert." >&2
            exit 1
          fi
          # Import the stable signing cert into a temp keychain, usable by codesign in THIS shell.
          KEYCHAIN="$RUNNER_TEMP/rp-signing.keychain-db"
          KCPW="$(uuidgen)"
          security create-keychain -p "$KCPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KCPW" "$KEYCHAIN"
          printf '%s' "$P12_B64" | base64 --decode > "$RUNNER_TEMP/signing.p12"
          security import "$RUNNER_TEMP/signing.p12" -P "$P12_PW" -k "$KEYCHAIN" -T /usr/bin/codesign -A
          rm -f "$RUNNER_TEMP/signing.p12"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          # Trust the self-signed cert for codeSigning so `find-identity -v` lists it as VALID
          # (build-host.sh gates on `find-identity -v -p codesigning`; without trust it falls back to ad-hoc).
          security find-certificate -c "RemotePair Local Signing" -p "$KEYCHAIN" > "$RUNNER_TEMP/rpcert.pem"
          sudo security add-trusted-cert -d -r trustRoot -p codeSign "$RUNNER_TEMP/rpcert.pem"
          echo "Signing identities:"; security find-identity -v -p codesigning | grep "RemotePair Local Signing" || true

          # Build + sign + verify (build-host finds the cert by CN in the search list above).
          ./host/build-host.sh

          # Gate: the asset MUST be signed with the stable cert (not ad-hoc) before we publish.
          codesign -dvv build/RemotePairHost.app 2>&1 | grep -q "Authority=RemotePair Local Signing" \
            || { echo "::error::app was signed ad-hoc, not with the stable cert — refusing to publish"; exit 1; }
          codesign --verify --strict build/RemotePairHost.app
          echo "signed with stable cert ✓"

          # Publish. Ship both a versioned asset and a stable-named copy so the GUI install
          # link (releases/latest/download/RemotePairHost.zip) is always valid regardless of version.
          ZIP="build/RemotePairHost-${RP_VERSION}.zip"
          STABLE="build/RemotePairHost.zip"
          ( cd build && /usr/bin/ditto -c -k --sequesterRsrc --keepParent RemotePairHost.app "RemotePairHost-${RP_VERSION}.zip" )
          cp "$ZIP" "$STABLE"
          gh release create "v${RP_VERSION}" "$ZIP" "$STABLE" --title "v${RP_VERSION}" --generate-notes
