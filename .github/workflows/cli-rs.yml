name: cli-rs (native client)

# Build + lint + test the single-source Rust client (`client/cli-rs/`) on all three
# target OSes using GitHub-hosted runners. The toolchain is pinned by
# `client/cli-rs/rust-toolchain.toml` (rustup honors it on first `cargo` call), so
# results are reproducible regardless of what each runner image preinstalls. The crate
# is dependency-free, so this needs no network beyond the toolchain.

on:
  push:
    branches: [develop, feat/rust-cli]
    paths:
      - "client/cli-rs/**"
      - ".github/workflows/cli-rs.yml"
  pull_request:
    paths:
      - "client/cli-rs/**"
      - ".github/workflows/cli-rs.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: client/cli-rs

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      # First cargo/rustup call installs the channel pinned in rust-toolchain.toml.
      - name: Toolchain
        run: |
          rustup show active-toolchain
          rustc -V
          cargo -V

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/cli-rs

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --locked

      - name: Test
        run: cargo test --locked
