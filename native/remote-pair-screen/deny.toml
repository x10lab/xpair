# cargo-deny configuration — the AGPL firewall for remote-pair-screen.
#
# RemotePair is licensed Apache-2.0. RustDesk is AGPL-3.0 and MUST NOT become a
# dependency (directly or transitively). This file enforces a PERMISSIVE-ONLY
# license policy and explicitly denies the (L)GPL/AGPL family.
#
# Run:  cargo-deny check licenses
#       cargo-deny check bans
#       cargo-deny check            # all checks

[graph]
# Evaluate the dependency graph for the host target we actually ship.
targets = [
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
]
all-features = false

[licenses]
# Permissive allow-list only. Anything not on this list is rejected.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",          # weak-copyleft, file-level; permitted (not viral like GPL)
    "CC0-1.0",          # public-domain dedication, common for small crates
]
# Copyleft licenses are NOT in `allow`, so they are denied by default.
# We do not need a separate `deny` list for them, but `confidence-threshold`
# keeps SPDX matching strict so a GPL crate cannot slip through as "unknown".
confidence-threshold = 0.93
# A handful of foundational crates ship a license file with no machine-readable
# SPDX. Clarify them explicitly rather than loosening the global policy.
# (None required for the current tree; add entries here if cargo-deny reports
#  an "unlicensed" crate that is in fact permissive.)
exceptions = []

# r-efi (a transitive UEFI crate) is "MIT OR Apache-2.0 OR LGPL-2.1-or-later".
# The OR means we can take MIT/Apache-2.0; cargo-deny resolves this to a
# permitted license automatically, so no clarification entry is needed.

[bans]
# Belt-and-suspenders: explicitly ban RustDesk crates by name, even though the
# license allow-list above would already reject AGPL. If any rustdesk-published
# crate ever appears in the tree, fail hard.
deny = [
    { name = "rustdesk" },
    { name = "rustdesk-server" },
    { name = "scrap" },          # RustDesk's AGPL capture crate — do NOT confuse with `scap`.
    { name = "hbb_common" },     # RustDesk shared crate (AGPL).
]
multiple-versions = "warn"
wildcards = "allow"

[advisories]
# Security advisories are not part of the license firewall, but keep the section
# present so `cargo-deny check` runs end to end. Yank/vuln handling is advisory.
yanked = "warn"

[sources]
# Only crates.io is trusted as a source for this crate.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
